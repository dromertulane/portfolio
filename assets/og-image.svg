<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glowA" cx="12%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#1f6f54" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#1f6f54" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="92%" cy="95%" r="60%">
      <stop offset="0%" stop-color="#1f6f54" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#1f6f54" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="medal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#efeadf"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#247a5d"/>
      <stop offset="1" stop-color="#134434"/>
    </linearGradient>
  </defs>

  <!-- paper -->
  <rect width="1200" height="630" fill="#f6f3ec"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- editorial frame -->
  <rect x="26" y="26" width="1148" height="578" rx="26" fill="none" stroke="#1f6f54" stroke-opacity="0.22" stroke-width="1.5"/>

  <!-- right medallion -->
  <g>
    <circle cx="985" cy="250" r="138" fill="url(#medal)" stroke="#1b211c" stroke-opacity="0.10"/>
    <circle cx="985" cy="250" r="120" fill="none" stroke="#1b211c" stroke-opacity="0.14"/>
    <circle cx="985" cy="250" r="143" fill="none" stroke="#1f6f54" stroke-opacity="0.35" stroke-width="1.4" stroke-dasharray="3 7"/>
    <text x="985" y="250" fill="url(#mono)" font-family="'Bitstream Charter','Charter','DejaVu Serif',Georgia,serif"
          font-size="132" font-weight="700" letter-spacing="-4" text-anchor="middle" dominant-baseline="central">DR</text>
  </g>

  <!-- eyebrow -->
  <text x="92" y="170" fill="#1f6f54" font-family="'DejaVu Sans','Liberation Sans',sans-serif"
        font-size="22" font-weight="700" letter-spacing="6">FINANCE · TREASURY · ANALYSIS</text>

  <!-- name -->
  <text x="88" y="300" fill="#1b211c" font-family="'Bitstream Charter','Charter','DejaVu Serif',Georgia,serif"
        font-size="116" font-weight="700" letter-spacing="-3">Dionisio</text>
  <text x="88" y="416" fill="#1b211c" font-family="'Bitstream Charter','Charter','DejaVu Serif',Georgia,serif"
        font-size="116" font-weight="700" letter-spacing="-3">Romero</text>

  <!-- tagline -->
  <text x="92" y="492" fill="#44504a" font-family="'Bitstream Charter','Charter','DejaVu Serif',Georgia,serif"
        font-size="31" font-style="italic">B.S. in Finance, Tulane University</text>
  <text x="92" y="532" fill="#6d7771" font-family="'DejaVu Sans','Liberation Sans',sans-serif"
        font-size="25">Financial analyst in aviation &#183; Lima, Peru</text>

  <!-- footer email -->
  <circle cx="100" cy="575" r="6" fill="#1f6f54"/>
  <text x="118" y="582" fill="#6d7771" font-family="'DejaVu Sans','Liberation Sans',sans-serif"
        font-size="24" font-weight="600">dromero1@tulane.edu</text>
</svg>
