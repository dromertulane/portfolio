<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Dionisio Romero</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#f6f3ec" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#12150f" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&display=swap" />
  <style>
    :root {
      --bg: #f6f3ec; --ink: #1b211c; --soft: #5b645e; --accent: #1f6f54; --line: rgba(27,33,28,.18);
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #12150f; --ink: #eef0e6; --soft: #8d978a; --accent: #6ec79c; --line: rgba(238,240,230,.2); }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--ink); text-align: center;
      font-family: "Inter", system-ui, sans-serif; padding: 2rem;
    }
    .wrap { max-width: 32rem; }
    .code {
      font-family: "Fraunces", Georgia, serif; font-weight: 500;
      font-size: clamp(4.5rem, 18vw, 8rem); line-height: 1; letter-spacing: -.04em;
      color: var(--accent); margin: 0;
    }
    h1 { font-family: "Fraunces", Georgia, serif; font-weight: 500; font-size: 1.6rem; margin: .75rem 0 .5rem; }
    p { color: var(--soft); line-height: 1.6; margin: 0 0 2rem; }
    a.home {
      display: inline-block; text-decoration: none; font-weight: 600; color: #fff;
      background: var(--accent); padding: .8rem 1.6rem; border-radius: 999px;
      transition: transform .16s ease;
    }
    @media (prefers-color-scheme: dark) { a.home { color: #0e120c; } }
    a.home:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="code">404</p>
    <h1>This page wandered off.</h1>
    <p>The link may be broken or the page may have moved. Let's get you back on track.</p>
    <a class="home" href="./">Return home</a>
  </main>
</body>
</html>
